// UI Toast Helper
function showToast(title, msg, type = 'success') {
    const toast = document.getElementById('toast');
    const titleEl = document.getElementById('toast-title');
    const msgEl = document.getElementById('toast-msg');
    const iconEl = document.getElementById('toast-icon');

    titleEl.textContent = title;
    msgEl.textContent = msg;
    
    if (type === 'success') {
        iconEl.innerHTML = "✓";
        iconEl.className = "w-8 h-8 rounded-xl bg-brand-fresh/20 flex items-center justify-center text-brand-fresh font-black";
    } else {
        iconEl.innerHTML = "✖";
        iconEl.className = "w-8 h-8 rounded-xl bg-red-100 flex items-center justify-center text-red-500 font-black";
    }

    toast.classList.remove('translate-y-20', 'opacity-0');
    toast.classList.add('translate-y-0', 'opacity-100');

    setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('translate-y-20', 'opacity-0');
    }, 4000);
}

function setView(viewName) {
    store.view = viewName;
    renderApp();
    window.scrollTo(0, 0);
}

function setDashboardTab(tabName) {
    store.dashboardTab = tabName;
    renderApp();
}


function handleLogin(e) {
    e.preventDefault();
    const emailInput = document.getElementById('login-email').value.trim();
    const passwordInput = document.getElementById('login-password').value;
    const roleInput = document.getElementById('login-role').value;

    // Check credentials as instructed
    if (roleInput === 'admin') {
        if (emailInput === 'admin@pionir.id' && passwordInput === 'adminpionir') {
            store.currentUser = { name: "Platform Administrator", email: emailInput, id: "admin_pionir" };
            store.currentRole = 'admin';
            store.dashboardTab = 'home';
            setView('dashboard');
            showToast("Login Admin Berhasil", "Selamat datang di ruang kendali pusat.", "success");
        } else {
            showToast("Akses Ditolak", "Kredensial Admin tidak cocok.", "error");
        }
    } 
    else if (roleInput === 'juri') {
        if (emailInput === 'juri@pionir.id' && passwordInput === 'pionir2026') {
            store.currentUser = { name: "Dewan Juri Kaltara", email: emailInput, id: "juri_pionir" };
            store.currentRole = 'juri';
            store.dashboardTab = 'home';
            setView('dashboard');
            showToast("Login Juri Berhasil", "Selamat datang di Panel Penilaian Lomba.", "success");
        } else {
            showToast("Akses Ditolak", "Kredensial Juri tidak cocok.", "error");
        }
    } 
    else if (roleInput === 'investor') {
        if (emailInput === 'investor@pionir.id' && passwordInput === 'pionir2026') {
            store.currentUser = { name: "Kaltara Capital Group", email: emailInput, id: "investor_pionir" };
            store.currentRole = 'investor';
            store.dashboardTab = 'home';
            setView('dashboard');
            showToast("Login Investor Berhasil", "Selamat datang di Katalis Penyaluran Modal.", "success");
        } else {
            showToast("Akses Ditolak", "Kredensial Investor tidak cocok.", "error");
        }
    } 
    else if (roleInput === 'peserta') {
        // Find existing participant or simulate new registration
        const found = participantsData.find(p => p.email.toLowerCase() === emailInput.toLowerCase());
        if (found && passwordInput === 'pionir2026') {
            store.currentUser = found;
            store.currentRole = 'peserta';
            store.dashboardTab = 'home';
            setView('dashboard');
            showToast("Selamat Datang", `Halo ${found.name}, mari kembangkan brand-mu!`, "success");
        } else {
            showToast("Kredensial Salah", "Harap gunakan kata sandi pionir2026 atau silakan mendaftar terlebih dahulu.", "error");
        }
    }
}

function handleRegistration(e) {
    e.preventDefault();
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const commodity = document.getElementById('reg-commodity').value;
    const brandName = document.getElementById('reg-brand').value.trim() || "Brand Lokal";
    const password = document.getElementById('reg-password').value;

    if (password !== 'pionir2026') {
        showToast("Sandi Wajib", "Untuk keseragaman sistem uji, kata sandi wajib: pionir2026", "error");
        return;
    }

    // Verify duplicate email
    if (participantsData.some(p => p.email.toLowerCase() === email.toLowerCase())) {
        showToast("Email Terdaftar", "Gunakan email lain atau silakan langsung login.", "error");
        return;
    }

    // Create new participant record
    const newParticipant = {
        id: "p_" + Date.now(),
        name: name,
        email: email,
        commodity: commodity,
        milestones: { learn: false, build: false, validate: false, scale: false },
        quizScore: 0,
        quizStatus: "Belum Ujian",
        brandName: brandName,
        brandTagline: "Rasa Komoditas Asli Kaltara",
        brandPalette: "seaweed",
        canvasNotes: [
            { id: 1, section: "value", text: `Inovasi produk berkualitas berbasis ${commodity}.`, color: "bg-yellow-100" }
        ],
        challengeFile: "",
        challengeStatus: "Belum Kirim",
        juriScore: null,
        juriFeedback: "",
        investedCapital: 0,
        investorNotes: ""
    };

    participantsData.push(newParticipant);
    showToast("Pendaftaran Sukses", "Wirausahawan baru berhasil terdaftar di database PIONIR!", "success");
    setView('login');
}

function handleLogout() {
    store.currentUser = null;
    setView('landing');
    showToast("Logout Berhasil", "Sesi Anda telah diakhiri.", "success");
}


function submitQuiz(e) {
    e.preventDefault();
    const selectedAnswer = document.querySelector('input[name="quiz-q1"]:checked');
    if (!selectedAnswer) {
        showToast("Kuis Kosong", "Pilihlah salah satu opsi jawaban.", "error");
        return;
    }

    const isCorrect = selectedAnswer.value === "correct";
    const participant = participantsData.find(p => p.email === store.currentUser.email);
    if (participant) {
        participant.quizScore = isCorrect ? 100 : 40;
        participant.quizStatus = isCorrect ? "Lulus" : "Belum Lulus";
        participant.milestones.learn = isCorrect;
        store.currentUser = participant;
    }

    renderApp();
    showToast(
        isCorrect ? "Selamat! Anda Lulus" : "Belum Lulus",
        isCorrect ? "Skor 100/100. Sertifikat kini aktif!" : "Skor 40/100. Pelajari kembali materi kuis.",
        isCorrect ? "success" : "error"
    );
}

function updateCanvas(section) {
    const input = document.getElementById(`canvas-input-${section}`);
    if (!input || !input.value.trim()) return;

    const colors = ['bg-yellow-100', 'bg-emerald-100', 'bg-blue-100', 'bg-rose-100', 'bg-purple-100'];
    const randomColor = colors[Math.floor(Math.random() * colors.length)];

    const participant = participantsData.find(p => p.email === store.currentUser.email);
    if (participant) {
        participant.canvasNotes.push({
            id: Date.now(),
            section: section,
            text: input.value.trim(),
            color: randomColor
        });
        participant.milestones.build = true;
        store.currentUser = participant;
    }

    input.value = '';
    renderApp();
    showToast("Kanvas Diperbarui", "Catatan sticky note berhasil ditempelkan.", "success");
}

function removeCanvasNote(noteId) {
    const participant = participantsData.find(p => p.email === store.currentUser.email);
    if (participant) {
        participant.canvasNotes = participant.canvasNotes.filter(n => n.id !== noteId);
        store.currentUser = participant;
    }
    renderApp();
    showToast("Catatan Dihapus", "Sticky note diambil dari kanvas.", "success");
}

function saveBranding(e) {
    e.preventDefault();
    const p = participantsData.find(p => p.email === store.currentUser.email);
    if (p) {
        p.brandName = document.getElementById('studio-brand-name').value;
        p.brandTagline = document.getElementById('studio-brand-tagline').value;
        p.brandPalette = document.getElementById('studio-brand-palette').value;
        store.currentUser = p;
    }
    renderApp();
    showToast("Branding Disimpan", "Karakter kemasan ritel produk Anda telah diperbarui.", "success");
}

function uploadChallenge(e) {
    e.preventDefault();
    const p = participantsData.find(p => p.email === store.currentUser.email);
    if (p) {
        p.challengeFile = "proposal_rencana_bisnis_" + p.id + ".pdf";
        p.challengeStatus = "Menunggu Review";
        p.milestones.validate = true;
        store.currentUser = p;
    }
    renderApp();
    showToast("Dokumen Terkirim", "Proposal Anda siap dievaluasi oleh Dewan Juri.", "success");
}


function submitGrade(participantId) {
    const scoreVal = parseInt(document.getElementById(`grade-score-${participantId}`).value);
    const feedbackVal = document.getElementById(`grade-feedback-${participantId}`).value.trim();

    const participant = participantsData.find(p => p.id === participantId);
    if (participant) {
        participant.juriScore = scoreVal;
        participant.juriFeedback = feedbackVal || "Bagus, pertahankan semangat berinovasi.";
        showToast("Penilaian Berhasil", `Berhasil memberi nilai ${scoreVal} untuk ${participant.name}`, "success");
        closeInspector();
        renderApp();
    }
}

function processInvestment(participantId) {
    const capitalVal = parseInt(document.getElementById(`invest-capital-${participantId}`).value);
    const noteVal = document.getElementById(`invest-note-${participantId}`).value.trim();

    if (capitalVal > store.investmentPool) {
        showToast("Dana Tidak Cukup", "Jumlah investasi melebihi pagu simulasi modal Anda.", "error");
        return;
    }

    const participant = participantsData.find(p => p.id === participantId);
    if (participant) {
        participant.investedCapital += capitalVal;
        participant.investorNotes = noteVal || "Sinergi percepatan produk unggulan daerah.";
        store.investmentPool -= capitalVal;
        showToast("Dana Dikucurkan", `Simulasi modal sebesar Rp ${capitalVal.toLocaleString()} disalurkan!`, "success");
        closeInspector();
        renderApp();
    }
}

function adminSaveParticipantEdit(participantId) {
    const nameVal = document.getElementById(`admin-edit-name-${participantId}`).value;
    const commVal = document.getElementById(`admin-edit-comm-${participantId}`).value;
    const scoreVal = parseInt(document.getElementById(`admin-edit-score-${participantId}`).value) || 0;

    const participant = participantsData.find(p => p.id === participantId);
    if (participant) {
        participant.name = nameVal;
        participant.commodity = commVal;
        participant.quizScore = scoreVal;
        participant.quizStatus = scoreVal >= 75 ? "Lulus" : "Belum Lulus";
        participant.milestones.learn = scoreVal >= 75;
        showToast("Data Disimpan", `Profil wirausahawan ${nameVal} diperbarui Admin.`, "success");
        closeInspector();
        renderApp();
    }
}

function adminAddProgram(e) {
    e.preventDefault();
    const title = document.getElementById('new-prog-title').value.trim();
    const category = document.getElementById('new-prog-cat').value;
    const target = document.getElementById('new-prog-target').value;

    store.activePrograms.push({
        id: Date.now(),
        title: title,
        category: category,
        target: target
    });

    document.getElementById('new-prog-title').value = '';
    renderApp();
    showToast("Program Ditambahkan", `Program "${title}" berhasil tayang di platform peserta.`, "success");
}

function adminDeleteProgram(id) {
    store.activePrograms = store.activePrograms.filter(p => p.id !== id);

    showToast("Program Dihapus", "Program dibatalkan oleh Admin.", "success");
}

function renderCommonLeaderboard() {
    // Sort participants by quizScore + juriScore (simulating total leaderboard)
    const sorted = [...participantsData].sort((a, b) => {
        const scoreA = (a.quizScore || 0) + (a.juriScore || 0);
        const scoreB = (b.quizScore || 0) + (b.juriScore || 0);
        return scoreB - scoreA;
    });

    return `
    <div class="space-y-6">
        <div class="border-b pb-4">
            <h2 class="text-xl font-black text-brand-dark">Peringkat & Nilai Progres Peserta</h2>
            <p class="text-xs text-brand-slate">Evaluasi total kelayakan komulatif berdasarkan kuis Academy, Canvas, dan Penilaian Juri.</p>
        </div>

        <div class="bg-white rounded-3xl border border-emerald-100/30 overflow-hidden shadow-sm">
            <div class="p-6 border-b">
                <h4 class="text-xs font-bold text-brand-dark uppercase tracking-wider">Tabel Pemeringkatan Inkubasi</h4>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b text-[10px] font-bold text-brand-slate uppercase tracking-wider">
                            <th class="p-4">Rank</th>
                            <th class="p-4">Nama Peserta</th>
                            <th class="p-4">Sektor Komoditas</th>
                            <th class="p-4">Academy Kuis</th>
                            <th class="p-4">Juri Score</th>
                            <th class="p-4">Skor Gabungan</th>
                            <th class="p-4">Pledges</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y text-xs">
                        ${sorted.map((p, idx) => `
                            <tr class="hover:bg-brand-light/20 transition-colors">
                                <td class="p-4 font-black text-brand-sea text-sm">#${idx + 1}</td>
                                <td class="p-4">
                                    <span class="font-bold text-brand-dark block">${p.name}</span>
                                    <span class="text-[10px] text-brand-slate">${p.brandName}</span>
                                </td>
                                <td class="p-4 text-brand-slate font-medium">${p.commodity}</td>
                                <td class="p-4 font-semibold">${p.quizScore}</td>
                                <td class="p-4 font-semibold">${p.juriScore || 'N/A'}</td>
                                <td class="p-4 font-black text-brand-dark">${(p.quizScore || 0) + (p.juriScore || 0)}</td>
                                <td class="p-4 font-bold text-brand-sea">Rp ${p.investedCapital.toLocaleString()}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    `;
}


function renderApp() {
    const app = document.getElementById('app');
    
    if (store.view === 'landing') {
        app.innerHTML = renderLanding();
    } else if (store.view === 'login') {
        app.innerHTML = renderLogin();
    } else if (store.view === 'register') {
        app.innerHTML = renderRegister();
    } else if (store.view === 'dashboard') {
        app.innerHTML = renderDashboard();
    }
    
    // Auto re-init icons globally
    lucide.createIcons();
}

// Boot up sequence
window.onload = function() {
    renderApp();
};
